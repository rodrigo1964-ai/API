<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Hub - Multi-Tool Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .api-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .api-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .api-card:hover {
            transform: translateY(-5px);
        }

        .api-card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .api-card p {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            min-height: 150px;
            resize: vertical;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: opacity 0.3s;
            width: 100%;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-container {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            display: none;
        }

        .result-container.show {
            display: block;
        }

        .result-container h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .result-content {
            background: white;
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid #667eea;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 400px;
            overflow-y: auto;
        }

        .error {
            border-left-color: #e74c3c;
        }

        .success {
            border-left-color: #2ecc71;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .template-btn {
            background: #28a745;
            margin-top: 10px;
            padding: 8px 15px;
            font-size: 14px;
        }

        .api-status {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-left: 10px;
        }

        .api-status.online {
            background: #2ecc71;
            box-shadow: 0 0 5px #2ecc71;
        }

        .api-status.offline {
            background: #e74c3c;
        }

        .api-status.checking {
            background: #f39c12;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 API Hub - Multi-Tool Interface</h1>

        <div class="api-grid">
            <!-- GNUBison API -->
            <div class="api-card">
                <h2>
                    GNUBison API
                    <span class="api-status checking" id="status-bison"></span>
                </h2>
                <p>Validador y evaluador de expresiones para Constraint Programming con propagación de incertidumbre.</p>

                <div class="form-group">
                    <label>API URL:</label>
                    <input type="text" id="bison-url" value="https://api-ru24.onrender.com/api/bison" placeholder="https://api.ejemplo.com/evaluate">
                </div>

                <div class="form-group">
                    <label>JSON Input:</label>
                    <textarea id="bison-input" placeholder='Ingresa el JSON...'>{
  "precision": 2,
  "variables": [
    {"name": "x", "type": "integer", "value": 10},
    {"name": "y", "type": "float", "value": 3.14}
  ],
  "expressions": [
    {"name": "suma", "formula": "x + y"}
  ]
}</textarea>
                </div>

                <button onclick="loadTemplate('bison')" class="template-btn">📋 Cargar plantilla con incertidumbre</button>
                <button onclick="callAPI('bison')" id="btn-bison">🚀 Evaluar</button>

                <div class="result-container" id="result-bison">
                    <h3>Resultado:</h3>
                    <div class="result-content" id="result-content-bison"></div>
                </div>
            </div>

            <!-- Placeholder para otra API -->
            <div class="api-card">
                <h2>
                    Custom API #1
                    <span class="api-status offline" id="status-custom1"></span>
                </h2>
                <p>Configura tu propia API personalizada aquí.</p>

                <div class="form-group">
                    <label>API URL:</label>
                    <input type="text" id="custom1-url" placeholder="https://api.ejemplo.com/endpoint">
                </div>

                <div class="form-group">
                    <label>JSON Input:</label>
                    <textarea id="custom1-input" placeholder='{"key": "value"}'></textarea>
                </div>

                <button onclick="callAPI('custom1')" id="btn-custom1">🚀 Llamar API</button>

                <div class="result-container" id="result-custom1">
                    <h3>Resultado:</h3>
                    <div class="result-content" id="result-content-custom1"></div>
                </div>
            </div>

            <!-- Placeholder para otra API -->
            <div class="api-card">
                <h2>
                    Custom API #2
                    <span class="api-status offline" id="status-custom2"></span>
                </h2>
                <p>Agrega otra API para expandir tu hub.</p>

                <div class="form-group">
                    <label>API URL:</label>
                    <input type="text" id="custom2-url" placeholder="https://api.ejemplo.com/endpoint">
                </div>

                <div class="form-group">
                    <label>JSON Input:</label>
                    <textarea id="custom2-input" placeholder='{"key": "value"}'></textarea>
                </div>

                <button onclick="callAPI('custom2')" id="btn-custom2">🚀 Llamar API</button>

                <div class="result-container" id="result-custom2">
                    <h3>Resultado:</h3>
                    <div class="result-content" id="result-content-custom2"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Templates de ejemplo
        const templates = {
            bison: {
                basic: {
                    precision: 2,
                    variables: [
                        {name: "x", type: "integer", value: 10},
                        {name: "y", type: "float", value: 3.14}
                    ],
                    expressions: [
                        {name: "suma", formula: "x + y"},
                        {name: "producto", formula: "x * y"}
                    ]
                },
                uncertainty: {
                    precision: 0,
                    variables: [
                        {name: "x", type: "integer", value: [1, 2, 3]},
                        {name: "y", type: "integer", value: [10, 20]}
                    ],
                    expressions: [
                        {name: "suma", formula: "x + y"},
                        {name: "comparacion", formula: "x > 2"}
                    ]
                }
            }
        };

        // Cargar plantilla
        function loadTemplate(apiName) {
            if (apiName === 'bison') {
                document.getElementById('bison-input').value =
                    JSON.stringify(templates.bison.uncertainty, null, 2);
            }
        }

        // Llamar a API
        async function callAPI(apiName) {
            const urlInput = document.getElementById(`${apiName}-url`);
            const jsonInput = document.getElementById(`${apiName}-input`);
            const resultDiv = document.getElementById(`result-${apiName}`);
            const resultContent = document.getElementById(`result-content-${apiName}`);
            const button = document.getElementById(`btn-${apiName}`);

            const url = urlInput.value.trim();
            const jsonText = jsonInput.value.trim();

            if (!url) {
                alert('Por favor ingresa una URL válida');
                return;
            }

            if (!jsonText) {
                alert('Por favor ingresa un JSON válido');
                return;
            }

            // Validar JSON
            let jsonData;
            try {
                jsonData = JSON.parse(jsonText);
            } catch (e) {
                resultDiv.classList.add('show');
                resultContent.className = 'result-content error';
                resultContent.textContent = `❌ JSON inválido: ${e.message}`;
                return;
            }

            // Mostrar loading
            button.disabled = true;
            button.textContent = '⏳ Procesando...';
            resultDiv.classList.add('show');
            resultContent.className = 'result-content';
            resultContent.innerHTML = '<div class="loading"><div class="spinner"></div><p>Llamando a la API...</p></div>';

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(jsonData)
                });

                const result = await response.json();

                if (response.ok) {
                    resultContent.className = 'result-content success';
                    resultContent.textContent = JSON.stringify(result, null, 2);
                } else {
                    resultContent.className = 'result-content error';
                    resultContent.textContent = `❌ Error ${response.status}:\n${JSON.stringify(result, null, 2)}`;
                }
            } catch (error) {
                resultContent.className = 'result-content error';
                resultContent.textContent = `❌ Error de red:\n${error.message}`;
            } finally {
                button.disabled = false;
                button.textContent = '🚀 ' + (apiName === 'bison' ? 'Evaluar' : 'Llamar API');
            }
        }

        // Verificar estado de APIs
        async function checkAPIStatus(apiName) {
            const urlInput = document.getElementById(`${apiName}-url`);
            const statusDot = document.getElementById(`status-${apiName}`);

            const url = urlInput.value.trim();
            if (!url) {
                statusDot.className = 'api-status offline';
                return;
            }

            statusDot.className = 'api-status checking';

            try {
                // Intentar hacer health check (asumiendo endpoint /health)
                const healthUrl = url.replace(/\/api\/[^\/]+$/, '/health');
                const response = await fetch(healthUrl, { method: 'GET' });

                if (response.ok) {
                    statusDot.className = 'api-status online';
                } else {
                    statusDot.className = 'api-status offline';
                }
            } catch {
                statusDot.className = 'api-status offline';
            }
        }

        // Verificar estado al cargar
        window.addEventListener('load', () => {
            checkAPIStatus('bison');

            // Re-verificar cada 30 segundos
            setInterval(() => {
                checkAPIStatus('bison');
            }, 30000);
        });

        // Permitir Ctrl+Enter para enviar
        document.querySelectorAll('textarea').forEach(textarea => {
            textarea.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 'Enter') {
                    const apiName = textarea.id.split('-')[0];
                    callAPI(apiName);
                }
            });
        });
    </script>
</body>
</html>
